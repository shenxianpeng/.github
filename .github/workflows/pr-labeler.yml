name: PR Labeler

on:
  workflow_call:

jobs:
  label_pr:
    permissions:
      # write permission is required for autolabeler
      pull-requests: write
      contents: read
    runs-on: ubuntu-latest
    steps:
      # Automatically label pull requests based on the release-drafter config
      - uses: release-drafter/release-drafter/autolabeler@563bf132657a13ded0b01fcb723c5a58cdd824e2 # v7.2.1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          config-name: github:shenxianpeng/.github:/.github/release-drafter.yml
