name: RepoKeeper Implementation Agent

on:
  workflow_call:
    inputs:
      repo:
        required: true
        type: string
        description: "GitHub repository as owner/name"
      issue_number:
        required: true
        type: string
        description: "GitHub issue number to implement"
    secrets:
      deepseek_api_key:
        required: true
        description: "DeepSeek (or OpenAI-compatible) API key"
      repo_token:
        required: true
        description: "GitHub token with contents:write, issues:write, pull-requests:write"
      llm_base_url:
        required: false
        description: "Optional: OpenAI-compatible API base URL (defaults to https://api.deepseek.com)"

jobs:
  agent:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
      pull-requests: write
    steps:
      - name: Run RepoKeeper Agent
        uses: shenxianpeng/repokeeper/agent@v1
        with:
          repo: ${{ inputs.repo }}
          issue: ${{ inputs.issue_number }}
          llm_api_key: ${{ secrets.deepseek_api_key }}
          llm_base_url: ${{ secrets.llm_base_url || 'https://api.deepseek.com' }}
          github_token: ${{ secrets.github_token }}
