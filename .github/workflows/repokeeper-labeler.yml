name: RepoKeeper Labeler

on:
  workflow_call:
    inputs:
      repo:
        required: true
        type: string
        description: "GitHub repository as owner/name"
      issue:
        required: false
        type: string
        description: "Issue number to label; omit for batch mode"
      pr:
        required: false
        type: string
        description: "Pull request number to label"
    secrets:
      deepseek_api_key:
        required: true
        description: "DeepSeek or OpenAI-compatible API key"
      repo_token:
        required: true
        description: "GitHub token with issues:write and pull-requests:write"

permissions: {}

jobs:
  labeler:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
      pull-requests: write
    steps:
      - name: Run RepoKeeper Labeler
        uses: shenxianpeng/repokeeper/labeler@v1
        with:
          repo: ${{ inputs.repo }}
          issue: ${{ inputs.issue }}
          pr: ${{ inputs.pr }}
          llm_api_key: ${{ secrets.deepseek_api_key }}
          repo_token: ${{ secrets.github_token }}
