name: RepoKeeper Daily Patrol

on:
  workflow_call:
    inputs:
      repo:
        required: true
        type: string
        description: "GitHub repository as owner/name"
    secrets:
      deepseek_api_key:
        required: true
        description: "DeepSeek (or OpenAI-compatible) API key"
      repo_token:
        required: true
        description: "GitHub token with issues:read, pull-requests:write, contents:write, actions:read"

jobs:
  patrol:
    runs-on: ubuntu-latest
    permissions:
      issues: read
      pull-requests: write
      contents: write
      actions: read
    steps:
      - name: Run Daily Patrol
        uses: shenxianpeng/repokeeper/patrol@v1
        with:
          repo: ${{ inputs.repo }}
          llm_api_key: ${{ secrets.deepseek_api_key }}
          github_token: ${{ secrets.github_token }}
