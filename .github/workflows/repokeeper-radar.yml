name: RepoKeeper Community Radar

on:
  workflow_call:
    inputs:
      repo:
        required: true
        type: string
        description: "GitHub repository as owner/name"
    secrets:
      deepseek_api_key:
        required: true
        description: "DeepSeek (or OpenAI-compatible) API key for LLM classification"
      repo_token:
        required: true
        description: "GitHub token with issues:write, discussions:read, contents:read"

jobs:
  radar:
    runs-on: ubuntu-latest
    permissions:
      issues: write
      discussions: read
      contents: read
    steps:
      - name: Run Community Radar
        uses: shenxianpeng/repokeeper/radar@v1
        with:
          repo: ${{ inputs.repo }}
          llm_api_key: ${{ secrets.deepseek_api_key }}
          github_token: ${{ secrets.github_token }}
